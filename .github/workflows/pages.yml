name: Publicar en GitHub Pages

# En cada push a main: estampa la versión (v1.<nº de commit>) en js/version.js
# y publica el resultado en gh-pages; GitHub Pages sirve la rama gh-pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Estampar versión
        run: |
          V="v1.$(git rev-list --count HEAD)"
          echo "Versión publicada: $V"
          printf "const VERSION = '%s';\n" "$V" > js/version.js
          # cache-busting: cada publicación cambia la URL de css/js para
          # que Safari/Pages no sirvan ficheros viejos de la caché
          sed -i "s|href=\"style.css\"|href=\"style.css?$V\"|; s|src=\"js/\([a-z]*\)\.js\"|src=\"js/\1.js?$V\"|g" index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/version.js index.html
          git commit -m "Publicar $V"
      - name: Publicar en gh-pages
        run: git push origin HEAD:gh-pages --force
