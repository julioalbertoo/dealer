name: Publicar en GitHub Pages

# Sincroniza main -> gh-pages en cada push; GitHub Pages sirve la rama gh-pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git push origin main:gh-pages --force
